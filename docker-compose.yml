services:
  db:
    image: postgres:15-alpine
    container_name: lcp_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env}
      POSTGRES_DB: ${POSTGRES_DB:-indie_coffee_loop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-indie_coffee_loop}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # Port 5432 intentionally NOT exposed to the host on production. The api
    # service reaches it over the internal compose network at `db:5432`. To
    # psql from the droplet shell, use `docker compose exec db psql ...`.
    # For local dev on your laptop, uncomment the next two lines.
    # ports:
    #   - "127.0.0.1:5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lcp_api
    depends_on:
      db:
        condition: service_healthy
    # .env on the droplet feeds every non-overridden setting (STRIPE_*,
    # JWT_SECRET, CORS_ORIGINS, FRONTEND_BASE_URL, etc.) into the container.
    env_file:
      - .env
    environment:
      # Force DATABASE_URL to hit the compose-internal `db` service, regardless
      # of what the .env says (so a laptop .env with localhost doesn't leak
      # into the droplet container).
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-indie_coffee_loop}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      # Inherits the HEALTHCHECK baked into the image, but we declare it here
      # too so `depends_on: service_healthy` is honoured by anything that
      # might add itself downstream (nginx, a worker, etc.).
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5).status == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
