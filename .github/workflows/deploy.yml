name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH + pull + rebuild on droplet
    runs-on: ubuntu-latest
    # Bumped from 5 → 15 to give `docker compose up -d --build` enough
    # headroom on a cold cache (the API image build is the longest step).
    timeout-minutes: 15

    steps:
      - name: SSH into droplet and redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          # `.env` is intentionally untracked (holds Stripe keys, DB
          # password, JWT secret). The persistent copy at
          # /root/.env-lcp-production is restored after the git reset so
          # `docker compose` can interpolate POSTGRES_PASSWORD et al.
          # Without this, compose fails with "POSTGRES_PASSWORD is
          # missing a value".
          #
          # `docker rm -f lcp_db lcp_api` clears any orphan named
          # containers from a previous compose project that doesn't
          # share state with the current one. Without this, `up` aborts
          # with "container name '/lcp_db' is already in use" because
          # `container_name:` is fixed regardless of project name and
          # compose can't reconcile across projects. The trailing
          # `|| true` keeps the chain alive when the containers don't
          # exist yet (clean droplet, first deploy).
          script: cd /var/www/lcp && git fetch --all && git reset --hard origin/main && cp /root/.env-lcp-production .env && chmod 600 .env && chown -R www-data:www-data /var/www/lcp && (docker rm -f lcp_db lcp_api 2>/dev/null || true) && docker compose up -d --build
